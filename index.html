<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lac Manitou — Températures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #07111e;
      --bg2:         #0c1a2e;
      --glass:       rgba(255,255,255,0.045);
      --glass-hover: rgba(255,255,255,0.08);
      --border:      rgba(255,255,255,0.09);
      --text:        #e2eaf4;
      --muted:       #6b82a0;
      --air:         #fbbf24;
      --surface:     #bae6fd;
      --depth:       #1e40af;
      --live:        #34d399;
      --radius:      18px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
    }

    /* ── Animated background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%,  rgba(14,80,130,.30) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%,  rgba(56,189,248,.12) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 55% 50%,  rgba(129,140,248,.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .page { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 2.5rem; }

    .hero {
      position: relative;
      padding: 3rem 1rem 2rem;
      overflow: hidden;
      margin-bottom: .5rem;
    }
    .hero-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .lake-logo {
      width: 180px;
      height: 180px;
      object-fit: contain;
      filter: drop-shadow(0 4px 24px rgba(56,189,248,.35));
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      margin-top: .9rem;
      font-size: .8rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: .35rem;
      background: rgba(52,211,153,.12);
      border: 1px solid rgba(52,211,153,.3);
      border-radius: 20px;
      padding: .2rem .65rem;
      font-size: .75rem;
      font-weight: 600;
      color: var(--live);
      letter-spacing: .04em;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--live);
      box-shadow: 0 0 0 0 rgba(52,211,153,.6);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0   rgba(52,211,153,.6) }
      70%  { box-shadow: 0 0 0 7px rgba(52,211,153,0)  }
      100% { box-shadow: 0 0 0 0   rgba(52,211,153,0)  }
    }

    /* ── Cards ── */
    .cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; margin-bottom: 1.5rem; }

    /* ══ TABLET (≤ 768px) ══════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      .page { padding: 1.5rem .9rem 3rem; }

      header h1 { font-size: clamp(1.4rem, 5vw, 2rem); }

      .status-row { gap: .4rem; }

      .hero { padding: 2rem .75rem 1.5rem; }
      .lake-logo { width: 300px; height: 300px; }
      .card { padding: 1.1rem 1rem 1rem; }
      .card-temp { font-size: 2.2rem; }
      .chart-header { flex-direction: column; gap: .75rem; }
      .chart-header > div:last-child { flex-direction: row; flex-wrap: wrap; gap: .5rem; }
      .chart-canvas-wrap { height: 240px; }
    }

    /* ══ MOBILE (≤ 480px) ════════════════════════════════════════════════════ */
    @media (max-width: 480px) {
      .page { padding: 1rem .75rem 2.5rem; }

      /* Cards : 1 colonne */
      .cards { grid-template-columns: 1fr; gap: .75rem; }

      /* Card layout horizontal sur mobile */
      .card {
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto auto;
        align-items: start;
        column-gap: .75rem;
        padding: .9rem 1rem;
      }
      .card-label    { grid-column: 1; grid-row: 1; margin-bottom: .3rem; }
      .card-temp     { grid-column: 1; grid-row: 2; font-size: 2rem; }
      .card-alt      { grid-column: 1; grid-row: 3; margin-top: .1rem; }
      .card-unit-toggle { grid-column: 2; grid-row: 1 / 3; align-self: center; flex-direction: column; }
      .card-trend    { grid-column: 1 / 3; grid-row: 4; margin-top: .4rem; }

      /* Tabs periode : pleine largeur */
      .period-tabs { gap: .3rem; }
      .tab { flex: 1; text-align: center; padding: .5rem .3rem; font-size: .75rem; }

      /* Toggles C/F et FR/EN : plus grands pour le touch */
      .utab, .ltab { padding: .4rem .8rem; font-size: .8rem; }
      .cutab { padding: .25rem .6rem; }

      /* Chart header empile */
      .chart-header { flex-direction: column; gap: .6rem; }
      .chart-header > div:last-child { justify-content: flex-start; flex-wrap: wrap; gap: .4rem; }

      .chart-canvas-wrap { height: 200px; }

      /* Hero */
      .hero { padding: 1.5rem .5rem 1.2rem; }
      .lake-logo { width: 140px; height: 140px; }
      header h1 { font-size: clamp(1.3rem, 6vw, 1.8rem); }
      header p  { font-size: .78rem; }

      /* Status row empilee */
      .status-row { flex-wrap: wrap; justify-content: center; gap: .35rem; }

      footer { font-size: .65rem; }
    }
      .card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.2rem 1.2rem;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: background .2s, transform .2s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .card:hover { background: var(--glass-hover); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,.4); }

    .card-air::before     { background: linear-gradient(90deg, var(--air), transparent); }
    .card-surface::before { background: linear-gradient(90deg, var(--surface), transparent); }
    .card-depth::before   { background: linear-gradient(90deg, var(--depth), transparent); }

    .card-label {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: .8rem;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .card-air     .card-label { color: var(--air); }
    .card-surface .card-label { color: var(--surface); }
    .card-depth   .card-label { color: var(--depth); }

    .card-temp {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -.04em;
      line-height: 1;
    }
    .card-unit { font-size: 1.4rem; font-weight: 400; opacity: .6; }

    .card-alt {
      margin-top: .25rem;
      font-size: .85rem;
      color: var(--muted);
      font-weight: 400;
    }

    .card-trend {
      margin-top: .5rem;
      font-size: .78rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: .25rem;
    }
    .trend-up   { color: #f87171; }
    .trend-down { color: #34d399; }
    .trend-flat { color: var(--muted); }

    /* ── Period tabs ── */
    .period-tabs {
      display: flex;
      justify-content: center;
      gap: .4rem;
      margin-bottom: 1.2rem;
    }
    .tab {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .45rem 1.1rem;
      font-size: .8rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
    }
    .tab:hover { color: var(--text); border-color: rgba(255,255,255,.2); }
    .tab.active {
      background: rgba(56,189,248,.15);
      border-color: rgba(56,189,248,.4);
      color: #7dd3fc;
    }

    /* ── Chart ── */
    .chart-wrap {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.25rem 1rem;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      gap: .5rem;
    }
    .chart-title { font-size: .95rem; font-weight: 600; }
    .chart-subtitle { font-size: .75rem; color: var(--muted); margin-top: .15rem; }

    .legend { display: flex; gap: 1rem; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: .35rem; font-size: .75rem; color: var(--muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    .chart-canvas-wrap { position: relative; height: 300px; }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: .72rem;
      color: var(--muted);
      opacity: .6;
    }

    /* ── Mini toggle par carte ── */
    .card-unit-toggle {
      display: flex;
      gap: .2rem;
      margin-top: .5rem;
    }
    .cutab {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 6px;
      padding: .15rem .5rem;
      font-size: .68rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .cutab:hover { color: var(--text); }
    .cutab.active {
      background: rgba(56,189,248,.15);
      border-color: rgba(56,189,248,.4);
      color: #7dd3fc;
    }

    /* ── Lang toggle ── */
    .lang-toggle { display: flex; gap: .25rem; }
    .ltab {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .3rem .7rem;
      font-size: .78rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
    }
    .ltab:hover { color: var(--text); }
    .ltab.active {
      background: rgba(56,189,248,.15);
      border-color: rgba(56,189,248,.4);
      color: #7dd3fc;
    }

    /* ── Unit toggle ── */
    .unit-toggle { display: flex; gap: .25rem; }
    .utab {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .3rem .7rem;
      font-size: .78rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
    }
    .utab:hover { color: var(--text); }
    .utab.active {
      background: rgba(56,189,248,.15);
      border-color: rgba(56,189,248,.4);
      color: #7dd3fc;
    }

    /* ── Loading ── */
    .skeleton { animation: shimmer 1.4s infinite; }
    @keyframes shimmer {
      0%,100% { opacity: .3 }
      50%      { opacity: .7 }
    }

    .error-msg {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: .85rem;
    }
  </style>

    <div class="hero-content">
    <h1 data-i18n="title">Lac Manitou</h1>
    <p data-i18n="subtitle">Station météo — Températures en temps réel</p>
    <div class="status-row">
      <span class="live-badge"><span class="live-dot"></span>LIVE</span>
      <span id="last-update">Chargement…</span>
      <div class="lang-toggle">
        <button class="ltab active" data-lang="fr">FR</button>
        <button class="ltab" data-lang="en">EN</button>
      </div>
    </div>
    </div>
  </div>
  </header>

  <!-- Cards -->
  <div class="cards">
    <div class="card card-air">
      <div class="card-label">🌡 <span data-i18n="air">Air ambiant</span></div>
      <div class="card-temp" id="val-air">—<span class="card-unit">°C</span></div>
      <div class="card-alt" id="val-air-f">— °F</div>
      <div class="card-unit-toggle">
        <button class="cutab active" data-sensor="air" data-unit="c">°C</button>
        <button class="cutab"        data-sensor="air" data-unit="f">°F</button>
      </div>
      <div class="card-trend" id="trend-air"></div>
    </div>
    <div class="card card-surface">
      <div class="card-label">🌊 <span data-i18n="surface">Eau surface</span></div>
      <div class="card-temp" id="val-surface">—<span class="card-unit">°C</span></div>
      <div class="card-alt" id="val-surface-f">— °F</div>
      <div class="card-unit-toggle">
        <button class="cutab active" data-sensor="surface" data-unit="c">°C</button>
        <button class="cutab"        data-sensor="surface" data-unit="f">°F</button>
      </div>
      <div class="card-trend" id="trend-surface"></div>
    </div>
    <div class="card card-depth">
      <div class="card-label">🔵 <span data-i18n="depth">Eau 4 pieds</span></div>
      <div class="card-temp" id="val-depth">—<span class="card-unit">°C</span></div>
      <div class="card-alt" id="val-depth-f">— °F</div>
      <div class="card-unit-toggle">
        <button class="cutab active" data-sensor="depth" data-unit="c">°C</button>
        <button class="cutab"        data-sensor="depth" data-unit="f">°F</button>
      </div>
      <div class="card-trend" id="trend-depth"></div>
    </div>
  </div>

  <!-- Period selector -->
  <div class="period-tabs">
    <button class="tab active" data-period="24h"    data-i18n="24h">24 heures</button>
    <button class="tab" data-period="7d"     data-i18n="7d">7 jours</button>
    <button class="tab" data-period="30d"    data-i18n="30d">30 jours</button>
    <button class="tab" data-period="season" data-i18n="season">Saison</button>
    <button class="tab" data-period="year"   data-i18n="year">Année</button>
  </div>

  <!-- Chart -->
  <div class="chart-wrap">
    <div class="chart-header">
      <div>
        <div class="chart-title" data-i18n="chartTitle">Historique des températures</div>
        <div class="chart-subtitle" id="chart-subtitle">Dernières 24 heures</div>
      </div>
      <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
        <div class="legend">
          <span class="legend-item"><span class="legend-dot" style="background:var(--air)"></span><span data-i18n="legendAir">Air</span></span>
          <span class="legend-item"><span class="legend-dot" style="background:var(--surface)"></span><span data-i18n="legendSurface">Surface</span></span>
          <span class="legend-item"><span class="legend-dot" style="background:var(--depth)"></span><span data-i18n="legendDepth">4 pieds</span></span>
        </div>
      </div>
    </div>
    <div class="chart-canvas-wrap"><canvas id="chart"></canvas></div>
  </div>

  <footer>
    <span data-i18n="footer">Mise à jour toutes les 5 minutes</span> &nbsp;·&nbsp; Lac Manitou
  </footer>

</div>

<script>
  // ── Force viewport pour mobile dans GAS ─────────────────────────────────────
  (function() {
    var mv = document.querySelector('meta[name="viewport"]');
    if (!mv) { mv = document.createElement('meta'); mv.name = 'viewport'; document.head.appendChild(mv); }
    mv.content = 'width=device-width, initial-scale=1.0';
  })();

  // ── Préférences (localStorage) ──────────────────────────────────────────────
  const LS = {
    get: (k, def) => { try { return localStorage.getItem(k) || def; } catch(e) { return def; } },
    set: (k, v)   => { try { localStorage.setItem(k, v); } catch(e) {} }
  };

  let currentPeriod     = '24h';
  let currentLang       = LS.get('lm_lang', 'fr');
  let sensorUnits = {
    air:     LS.get('lm_unit_air',     'c'),
    surface: LS.get('lm_unit_surface', 'c'),
    depth:   LS.get('lm_unit_depth',   'c'),
  };


  const i18n = {
    fr: {
      title:         'Lac Manitou',
      subtitle:      'Station météo — Températures en temps réel',
      air:           'Air ambiant',
      surface:       'Eau surface',

    en: {

      air:           'Ambient air',
      surface:       'Surface water',
      depth:         'Water 4 feet',
      '24h':         '24 hours',

    }
  };

  function applyLang() {
    const t = i18n[currentLang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (t[key]) el.textContent = t[key];
    });
    // Subtitle du graphique
    const subKeys = { '24h': 'sub24h', '7d': 'sub7d', '30d': 'sub30d', 'season': 'subSeason', 'year': 'subYear' };
    document.getElementById('chart-subtitle').textContent = t[subKeys[currentPeriod]];
    // Loading si pas encore de data
    const upd = document.getElementById('last-update');
    if (upd.textContent.startsWith('Chargement') || upd.textContent.startsWith('Loading')) {
      upd.textContent = t.loading;
    }
  }
  let chart = null;
  let allData = [];

  const toF = c => c != null ? c * 9/5 + 32 : null;

  // ── Chart init ──────────────────────────────────────────────────────────────
  function initChart() {
    const ctx = document.getElementById('chart').getContext('2d');

    const mkGrad = (color, alpha1, alpha2) => {
      const g = ctx.createLinearGradient(0, 0, 0, 300);
      g.addColorStop(0,   color.replace(')', `,${alpha1})`).replace('rgb', 'rgba'));
      g.addColorStop(1,   color.replace(')', `,${alpha2})`).replace('rgb', 'rgba'));
      return g;
    };

    chart = new Chart(ctx, {
      type: 'line',
      data: {
        datasets: [
          {
            label: 'Air',
            borderColor: '#fbbf24',
            backgroundColor: 'rgba(251,191,36,.12)',
            borderWidth: 2,
            pointRadius: 0,
            pointHoverRadius: 5,
            pointHoverBackgroundColor: '#fbbf24',
            tension: 0.4,
            fill: true,
            data: []

            label: 'Surface',
            borderColor: '#bae6fd',
            backgroundColor: 'rgba(186,230,253,.10)',
            borderWidth: 2,
            pointRadius: 0,
            pointHoverRadius: 5,
            pointHoverBackgroundColor: '#bae6fd',
            tension: 0.4,
            fill: true,
            data: []

            label: '4 pieds',
            borderColor: '#1e40af',
            backgroundColor: 'rgba(30,64,175,.12)',

            pointRadius: 0,
            pointHoverRadius: 5,
            pointHoverBackgroundColor: '#1e40af',
            tension: 0.4,
            fill: true,
            data: []
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        resizeDelay: 200,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(7,17,30,.95)',
            borderColor: 'rgba(255,255,255,.1)',
            borderWidth: 1,
            titleColor: '#6b82a0',
            bodyColor: '#e2eaf4',
            padding: 12,
            callbacks: {
              label: ctx => {
                const c = ctx.parsed.y;
                return ` ${ctx.dataset.label}: ${c.toFixed(1)}°C  /  ${(c * 9/5 + 32).toFixed(1)}°F`;
              }
            }
          }
        },
        scales: {
          x: {
            type: 'time',
            time: { tooltipFormat: 'dd MMM HH:mm' },
            grid: { color: 'rgba(255,255,255,.04)' },
            ticks: { color: '#4b6280', font: { size: 11 }, maxTicksLimit: 8 }
          },
          y: {
            position: 'left',
            grid: { color: 'rgba(255,255,255,.04)' },
            ticks: { color: '#4b6280', font: { size: 11 }, callback: v => v + '°C' }
          },
          yF: {
            position: 'right',
            grid: { drawOnChartArea: false },
            ticks: { color: '#4b6280', font: { size: 11 }, callback: v => Math.round(v) + '°F' }
          }
        }
      }
    });
  }

  // ── Fetch data via Firebase Realtime Database (REST, lecture publique) ────────
  const RTDB = 'https://lac-manitou-temperatures-d284a-default-rtdb.firebaseio.com';
  // ms = fenêtre ; bucket = granularité d'agrégation (0 = brut)
  //   24h → brut | 7d/30d → moyenne horaire | saison/année → moyenne journalière
  const PERIOD_CFG = {
    '24h':    { ms: 864e5,     bucket: 0    },
    '7d':     { ms: 7 * 864e5, bucket: 36e5 },
    '30d':    { ms: 30 * 864e5, bucket: 36e5 },
    'season': { ms: 180 * 864e5, bucket: 864e5 },
    'year':   { ms: 365 * 864e5, bucket: 864e5 },
  };

  function fetchData(period) {
    const cfg = PERIOD_CFG[period] || PERIOD_CFG['24h'];
    const limit = Math.ceil(cfg.ms / 3e5 * 1.2); // ~1 lecture / 5 min + marge
    const url = RTDB + '/readings.json?orderBy=' + encodeURIComponent('"$key"') +
                '&limitToLast=' + limit;
    return fetch(url)
      .then(r => r.json())
      .then(obj => {
        if (!obj) return [];
        const cutoff = Date.now() - cfg.ms;
        const rows = Object.keys(obj)
          .map(k => ({ t: Number(k), air: obj[k].air, surface: obj[k].surface, depth: obj[k].depth }))
          .filter(d => d.t >= cutoff)
          .sort((a, b) => a.t - b.t);

        if (cfg.bucket === 0) return rows;

        // Agrégation par bucket (heure ou jour)
        const buckets = {};
        for (const d of rows) {
          const key = Math.floor(d.t / cfg.bucket) * cfg.bucket;
          const b = buckets[key] || (buckets[key] = { air: 0, surface: 0, depth: 0, n: 0 });
          b.air += d.air; b.surface += d.surface; b.depth += d.depth; b.n++;
        }
        const round1 = v => Math.round(v * 10) / 10;
        return Object.keys(buckets).sort((a, b) => a - b).map(key => {
          const b = buckets[key];
          return { t: Number(key), air: round1(b.air / b.n), surface: round1(b.surface / b.n), depth: round1(b.depth / b.n) };
        });
      })
      .catch(err => { console.error(err); return []; });
  }

  // ── Trend helper ─────────────────────────────────────────────────────────────
  function trendLabel(data, key) {
    if (data.length < 2) return '';
    const last = data[data.length - 1][key];
    // find point ~1h ago
    const now = new Date(data[data.length - 1].t).getTime();
    let ref = data[0][key];
    for (const d of data) {
      if (now - new Date(d.t).getTime() <= 60 * 60 * 1000) { ref = d[key]; break; }
    }
    const diff = last - ref;
    const t = i18n[currentLang];
    if (Math.abs(diff) < 0.1) return `<span class="trend-flat">${t.stable}</span>`;
    const cls  = diff > 0 ? 'trend-up' : 'trend-down';
    const arr  = diff > 0 ? '↑' : '↓';
    return `<span class="${cls}">${arr} ${Math.abs(diff).toFixed(1)}°C ${t.vsHour}</span>`;
  }

  // ── Update UI ────────────────────────────────────────────────────────────────
  function updateUI(data) {
    if (!data.length) return;

    const last = data[data.length - 1];

    // Cards
    const fmt = v => v != null ? v.toFixed(1) : '—';

    // Affichage par carte selon l'unité préférée
    function cardDisplay(key, val) {
      const u   = sensorUnits[key];
      const pri = u === 'f' ? toF(val) : val;
      const sec = u === 'f' ? val : toF(val);
      const priU = u === 'f' ? '°F' : '°C';
      const secU = u === 'f' ? '°C' : '°F';
      document.getElementById(`val-${key}`).innerHTML =
        `${fmt(pri)}<span class="card-unit">${priU}</span>`;
      document.getElementById(`val-${key}-f`).textContent = `${fmt(sec)} ${secU}`;
    }
    cardDisplay('air',     last.air);
    cardDisplay('surface', last.surface);
    cardDisplay('depth',   last.depth);

    document.getElementById('trend-air').innerHTML     = trendLabel(data, 'air');
    document.getElementById('trend-surface').innerHTML = trendLabel(data, 'surface');
    document.getElementById('trend-depth').innerHTML   = trendLabel(data, 'depth');

    // Last update
    const ts = new Date(last.t);
    const locale = currentLang === 'fr' ? 'fr-CA' : 'en-CA';
    document.getElementById('last-update').textContent =
      i18n[currentLang].lastUpdate + ts.toLocaleString(locale, { hour:'2-digit', minute:'2-digit', day:'numeric', month:'short' });

    // Chart — données toujours en °C ; l'axe droit affiche l'équivalent °F
    const mkPoints = key => data.map(d => ({ x: new Date(d.t), y: d[key] }));
    chart.data.datasets[0].data = mkPoints('air');
    chart.data.datasets[1].data = mkPoints('surface');
    chart.data.datasets[2].data = mkPoints('depth');

    // Aligner l'axe °F (droite) sur la plage °C (gauche)
    let lo = Infinity, hi = -Infinity;
    for (const d of data) {
      [d.air, d.surface, d.depth].forEach(v => {
        if (v == null) return;
        if (v < lo) lo = v;
        if (v > hi) hi = v;
      });
    }
    if (lo === Infinity) { lo = 0; hi = 30; }
    const pad = Math.max(1, (hi - lo) * 0.08);
    const yMin = Math.floor(lo - pad), yMax = Math.ceil(hi + pad);
    chart.options.scales.y.min  = yMin;
    chart.options.scales.y.max  = yMax;
    chart.options.scales.yF.min = toF(yMin);
    chart.options.scales.yF.max = toF(yMax);

    const timeUnit = currentPeriod === '24h' ? 'hour' : 'day';
    chart.options.scales.x.time.unit = timeUnit;
    chart.update();
  }

  // ── Period subtitles ─────────────────────────────────────────────────────────
  // ── Load ─────────────────────────────────────────────────────────────────────
  async function load(period) {
    currentPeriod = period;
    const subKeys = { '24h': 'sub24h', '7d': 'sub7d', '30d': 'sub30d', 'season': 'subSeason', 'year': 'subYear' };
    document.getElementById('chart-subtitle').textContent = i18n[currentLang][subKeys[period]];
    try {
      const data = await fetchData(period);
      allData = data;
      updateUI(data);
    } catch (e) {
      console.error(e);
    }
  }

  // ── Tab click ────────────────────────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      load(btn.dataset.period);
    });
  });


  // ── Lang toggle ──────────────────────────────────────────────────────────────
  document.querySelectorAll('.ltab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.ltab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      currentLang = btn.dataset.lang;
      LS.set('lm_lang', currentLang);
      applyLang();
      if (allData.length) updateUI(allData);
    });
  });

  // ── Mini toggles par capteur ────────────────────────────────────────────────
  document.querySelectorAll('.cutab').forEach(btn => {
    btn.addEventListener('click', () => {
      const sensor = btn.dataset.sensor;
      document.querySelectorAll(`.cutab[data-sensor="${sensor}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      sensorUnits[sensor] = btn.dataset.unit;
      LS.set(`lm_unit_${sensor}`, btn.dataset.unit);
      if (allData.length) updateUI(allData);
    });
  });

  // ── Auto-refresh every 5 min ─────────────────────────────────────────────────
  // Appliquer les préférences sauvegardées aux boutons
  function applyPrefsToButtons() {
    // Langue
    document.querySelectorAll('.ltab').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === currentLang);
    });
    // Unités par capteur
    document.querySelectorAll('.cutab').forEach(b => {
      b.classList.toggle('active', b.dataset.unit === sensorUnits[b.dataset.sensor]);
    });
  }

  // GA4 : le tag client (gtag) dans le <head> envoie page_view automatiquement
  // sur Firebase Hosting (l'iframe sandbox de GAS bloquait ces requêtes).

  initChart();
  applyLang();
  applyPrefsToButtons();
  load('24h');
  setInterval(() => load(currentPeriod), 5 * 60 * 1000);
</script>
</body>
</html>
