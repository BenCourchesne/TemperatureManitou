# ── 1. Ajouter dans configuration.yaml ──────────────────────────────────────
rest_command:
  manitou_temperatures:
    url: "https://script.google.com/macros/s/AKfycbwF_3eis5gtHZnV1znEYmQDjTM8DcxDqSR4YngAATKqLr2a1dtEfcWpC1ydgnXyG8g/exec"
    method: POST
    content_type: "application/json"
    payload: >-
      {
        "air":       {{ states('sensor.sondes_quai_lac_manitou_temperature_air')     | float(0) }},
        "surface":   {{ states('sensor.sondes_quai_lac_manitou_temperature_surface') | float(0) }},
        "depth":     {{ states('sensor.sondes_quai_lac_manitou_temperature_4_pi')   | float(0) }},
        "timestamp": "{{ now().isoformat() }}"
      }


# ── 2. Automation (automations.yaml ou UI) ───────────────────────────────────
automation:
  - alias: "Manitou — Envoyer températures toutes les 5 min"
    description: "Pousse les 3 capteurs ESPHome vers Google Sheets via Apps Script"
    trigger:
      - platform: time_pattern
        minutes: "/5"
    condition:
      # N'envoie que si les capteurs sont disponibles
      - condition: not
        conditions:
          - condition: state
            entity_id: sensor.sondes_quai_lac_manitou_temperature_air
            state: "unavailable"
          - condition: state
            entity_id: sensor.sondes_quai_lac_manitou_temperature_surface
            state: "unavailable"
          - condition: state
            entity_id: sensor.sondes_quai_lac_manitou_temperature_4_pi
            state: "unavailable"
    action:
      - service: rest_command.manitou_temperatures
        response_variable: response
      - if:
          - condition: template
            value_template: "{{ response.status != 200 }}"
        then:
          - service: notify.persistent_notification
            data:
              title: "Manitou — Erreur envoi"
              message: "Code HTTP {{ response.status }}"
