name: Backup Firebase data

on:
  schedule:
    - cron: '13 7 * * *'   # ~03:13 EDT / 02:13 EST daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch /daily (small, every run)
        run: |
          mkdir -p backups
          curl -sf "https://lac-manitou-temperatures-d284a-default-rtdb.firebaseio.com/daily.json" \
            | jq -S . > backups/daily.json

      - name: Fetch /readings (larger, weekly snapshot, current UTC year only)
        run: |
          if [ "$(date -u +%u)" = "7" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            YEAR="$(date -u +%Y)"
            START_MS="$(date -u -d "${YEAR}-01-01T00:00:00Z" +%s000)"
            curl -sf "https://lac-manitou-temperatures-d284a-default-rtdb.firebaseio.com/readings.json?orderBy=%22%24key%22&startAt=%22${START_MS}%22" \
              | jq -S . > "backups/readings-${YEAR}.json"
          fi

      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: automated backup $(date -u +%F)"
            git push
          fi
